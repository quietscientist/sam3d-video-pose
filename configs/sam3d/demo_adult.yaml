# Demo configuration for adult human walking video
# Usage: python scripts/demo.py --demo-adult
# Note: Video URL is passed via command line (dummy path here for config validation)

experiment_name: demo_adult_walking

# Dummy input (will be overridden by command-line argument)
input: "dummy_video.mp4"

# Text prompt for segmentation
text_prompt: "a person walking"

# Output directory
output_dir: "output"

# Processing parameters
processing:
  max_frames: 300                     # Process first 300 frames
  skip_mesh_generation: false
  skip_mesh_saving: false
  export_coco_csv: true                # Export COCO 17-point CSV files
  bundle_adjustment: true              # Apply bundle adjustment to fix bone lengths
  constrain_torso: false
  temporal_smooth_keypoints: true      # Apply Savitzky-Golay temporal smoothing
  temporal_smooth_window: 11
  temporal_smooth_polyorder: 3
  smoothing_sigma: 2.0

# Quality filter parameters
quality:
  enable_filter: false
  z_velocity_threshold: 0.15
  total_velocity_threshold: 0.25
  vertex_displacement_threshold: 0.20

# Metrics and logging
metrics:
  enable_metrics: true
  enable_plots: true

# SAM3 tracking parameters (single-subject lock-on)
tracking:
  max_num_objects: 1
  new_det_thresh: 0.9

# Visualization parameters
visualization:
  flip_z: true
  fps: 10
